git:
  baseurl: https://github.com
  prefix: QubesOS/qubes-
  branch: release4.2
  maintainers:
    # marmarek
    - '0064428F455451B3EBE78A7F063938BA42CFA724'
    # simon
    - '274E12AB03F2FE293765FC06DA0434BC706E1FCF'

backend-vmm: xen
debug: true
verbose: true
qubes-release: r4.2
gpg-client: '/usr/bin/qubes-gpg-client-wrapper'
skip-git-fetch: true

mirrors:
  vm-fc41:
    - https://www.nic.funet.fi/pub/mirrors/fedora.redhat.com/pub/fedora/linux
  vm-lp155:
    - https://ftp.funet.fi/pub/mirrors/ftp.opensuse.com/pub/opensuse
  vm-lp156:
    - https://ftp.funet.fi/pub/mirrors/ftp.opensuse.com/pub/opensuse
  vm-tw:
    - https://ftp.funet.fi/pub/mirrors/ftp.opensuse.com/pub/opensuse
  qubes:
    - https://ftp.acc.umu.se/mirror/qubes-os.org/repo/yum

sign-key:
  rpm: '60EDBFB2B0DA5D5687FDA98F301B46327290AF58'
  iso: '60EDBFB2B0DA5D5687FDA98F301B46327290AF58'

cache:
  vm-lp155:
    packages:
      - xorg-x11-server-sdk
      - pandoc-cli
      - python311-setuptools
  vm-lp156:
    packages:
      - xorg-x11-server-sdk
      - pandoc-cli
      - python311-setuptools
  vm-tw:
    packages:
      - xorg-x11-server-sdk
      - pandoc-cli
      - python3-setuptools

distributions:
  - vm-lp155
  - vm-lp156
  - vm-tw
  - vm-fc41

templates:
  - leap-15.5:
      dist: lp155
  - leap-15.5-minimal:
      dist: lp155
      flavor: minimal
      options:
        - minimal
  - leap-15.6:
      dist: lp156
  - leap-15.6-minimal:
      dist: lp156
      flavor: minimal
      options:
        - minimal
  - tumbleweed:
      dist: tw
  - tumbleweed-minimal:
      dist: tw
      flavor: minimal
      options:
        - minimal
  - fedora-41:
      dist: fc41
      options:
        - selinux

