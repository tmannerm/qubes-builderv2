# Common options
config_opts['basedir'] = '@BUILDER_DIR@/build'
config_opts['cache_topdir'] = '@BUILDER_DIR@/cache/mock'
config_opts['dist'] = os.environ['DIST']
config_opts['extra_chroot_dirs'] = ['/run/lock',]
config_opts['legal_host_arches'] = ('x86_64',)
config_opts['macros']['_buildhost'] = 'reproducible'
config_opts['macros']['source_date_epoch_from_changelog'] = '1'
config_opts['macros']['use_source_date_epoch_as_buildtime'] = '1'
config_opts['target_arch'] = 'x86_64'

config_opts['plugin_conf']['bind_mount_enable'] = os.environ.get("BIND_MOUNT_ENABLE", False)
config_opts['plugin_conf']['bind_mount_opts']['dirs'].append(('@BUILDER_DIR@/plugins', '/plugins' ))

# Specific to Tumbleweed
config_opts['macros']['build_mtime_policy'] = 'clamp_to_source_date_epoch'
config_opts['chroot_setup_cmd'] = 'install patterns-devel-C-C++-devel_C_C++ patterns-devel-base-devel_rpm_build rpm-repos-openSUSE-Tumbleweed lsb-release'
config_opts['macros']['%dist'] = '.' + config_opts['dist']
#+ '%(sh -c ". /etc/os-release; echo \$VERSION_ID")'
config_opts['macros']['%is_opensuse'] = '1'
config_opts['releasever'] = os.environ['DIST_VER']
config_opts['root'] = 'tumbleweed-rolling-x86_64'
config_opts['package_manager'] = 'dnf5'
config_opts['description'] = 'openSUSE Tumbleweed'

# Enable bootstrap
config_opts['bootstrap_image'] = 'registry.opensuse.org/opensuse/tumbleweed-dnf'
config_opts['use_bootstrap_image'] = False
config_opts['use_bootstrap'] = False

# Python build macros that are only in Fedora-based distributions
config_opts['macros']['python3_pkgversion'] = '3'
config_opts['macros']['py3dir'] = '%{_builddir}/python3-%{name}-%{version}-%{release}'

config_opts['dnf.conf'] = """
[main]
keepcache=1
debuglevel=2
reposdir=/dev/null
logfile=/var/log/yum.log
retries=20
obsoletes=1
gpgcheck=0
assumeyes=1
syslog_ident=mock
syslog_device=
install_weak_deps=0
metadata_expire=0
mdpolicy=group:primary
best=1
excludepkgs=*.i586,*.i686

protected_packages=
user_agent={{{{ user_agent }}}}

# repos

[opensuse-tumbleweed-oss]
name=openSUSE Tumbleweed - OSS
baseurl=https://download.opensuse.org/tumbleweed/repo/oss/
#metalink=https://download.opensuse.org/tumbleweed/repo/oss/repodata/repomd.xml.metalink
gpgkey=file:///usr/share/distribution-gpg-keys/opensuse/RPM-GPG-KEY-openSUSE-Tumbleweed
gpgcheck=1
skip_if_unavailable=False
metadata_expire=6h

# OBS repositories that contains some required packages missing from standard repos
[obs-qubes-build]
name=OBS Qubes OS build
type=rpm-md
baseurl=https://download.opensuse.org/repositories/home:/wicked:/qubes-build:/tw/tw
gpgkey=https://download.opensuse.org/repositories/home:/wicked:/qubes-build:/tw/tw/repodata/repomd.xml.key
gpgcheck=1
enabled=1
skip_if_unavailable=True
metadata_expire=6h

[builder-local]
name=builder-local
baseurl=file://@BUILDER_DIR@/repository
gpgcheck=0
exclude=qubes-release
skip_if_unavailable=False

[qubes-current]
name=qubes-{package_set}-current
baseurl=https://yum.qubes-os.org/r{qubes_version}/current/{package_set}/tw
failovermethod=priority
gpgkey=file://{keys_dir}/RPM-GPG-KEY-qubes-{qubes_version}-openSUSE
gpgcheck=1
repo_gpgcheck = 1
exclude=qubes-release
enabled=0
skip_if_unavailable=False

[qubes-current-testing]
name=qubes-{package_set}-testing
baseurl=https://yum.qubes-os.org/r{qubes_version}/current-testing/{package_set}/tw
failovermethod=priority
gpgkey=file://{keys_dir}/RPM-GPG-KEY-qubes-{qubes_version}-openSUSE
gpgcheck=1
repo_gpgcheck = 1
exclude=qubes-release
enabled=0
skip_if_unavailable=False
""".format(
    package_set=os.environ['PACKAGE_SET'],
    qubes_version=os.environ.get('USE_QUBES_REPO_VERSION'),
    keys_dir=('@BUILDER_DIR@/plugins/chroot_rpm/keys'),
)
